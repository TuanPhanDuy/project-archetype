# Production. Minimal exposure, quiet logs, larger pool, low trace sampling.
# All connection details and the OTLP endpoint MUST come from the environment.
spring:
  jpa:
    show-sql: false
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never        # never leak internals publicly
      probes:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}

logging:
  structured:
    format:
      console: ecs
  level:
    root: WARN
    org.springframework: WARN
    com.onemount.archetype: INFO

# Keep the machine-readable spec available (gateways/portals can pull it), but turn off
# the interactive Swagger UI in production.
springdoc:
  swagger-ui:
    enabled: false
