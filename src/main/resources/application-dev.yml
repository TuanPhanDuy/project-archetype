# Local development. Run with: --spring.profiles.active=dev
# Pairs with compose.yaml (Postgres) and observability/compose-observability.yaml.
# Human-readable logs, SQL echo, everything exposed, full trace sampling.
spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param   # add ?trace=true to see a stack trace locally

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0     # sample everything locally; exports to the local collector

logging:
  level:
    com.anbit.archetype: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web: DEBUG
