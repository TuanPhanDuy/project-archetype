# Staging — pre-production mirror. Same shape as prod with slightly higher sampling
# and INFO app logs for release validation.
spring:
  jpa:
    show-sql: false
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.2}

logging:
  structured:
    format:
      console: ecs
  level:
    root: INFO
    com.anbit.archetype: INFO
