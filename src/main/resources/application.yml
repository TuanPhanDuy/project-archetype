# ============================================================================
# Base configuration shared by all environments. Environment-specific overrides
# live in application-{dev,uat,staging,prod}.yml and are selected with
# SPRING_PROFILES_ACTIVE (e.g. SPRING_PROFILES_ACTIVE=prod).
# Secrets and connection details come from env vars / mounted config tree.
# ============================================================================
spring:
  application:
    name: service-archetype

  # Virtual threads: Spring MVC handlers run on virtual threads (recommended on Java 21+).
  threads:
    virtual:
      enabled: true

  mvc:
    # Return RFC 9457 ProblemDetail for Spring's built-in exceptions too (not just our advice).
    problemdetails:
      enabled: true

  # ---- Datasource (PostgreSQL) + HikariCP connection pool ----
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/app}
    username: ${DB_USERNAME:app}
    password: ${DB_PASSWORD:app}
    hikari:
      pool-name: ${spring.application.name}-pool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}   # wait for a connection
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}              # 10m
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}             # 30m (< DB/LB idle cutoff)
      validation-timeout: 5000
      # Let Spring manage transactions; disabling autocommit avoids a per-statement round-trip.
      auto-commit: false

  # ---- JPA / Hibernate ----
  jpa:
    hibernate:
      # Schema is owned by Flyway. Never let Hibernate mutate it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          batch_size: 25
        order_inserts: true
        order_updates: true

  # ---- Flyway migrations ----
  flyway:
    enabled: true
    baseline-on-migrate: false
    validate-on-migrate: true
    locations: classpath:db/migration

  # Optional: load secrets mounted as a config tree (e.g. Kubernetes/Docker secrets).
  config:
    import: optional:configtree:/run/secrets/

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  # Safe defaults for the fallback /error path (errors not caught by @RestControllerAdvice,
  # e.g. in filters). The ProblemDetail responses carry the useful detail; the dev profile
  # turns these on for debugging.
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

# ============================================================================
# Observability: metrics (Prometheus), tracing (OTLP), health probes.
# ============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true            # /actuator/health/liveness and /readiness
      show-details: when-authorized
      group:
        readiness:
          include: readinessState,db
  info:
    git:
      mode: full
    env:
      enabled: true
  # ---- Metrics ----
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s
  # ---- Tracing ----
  # Sampling is 0 by default so local/test runs don't emit spans. Each deployed profile
  # raises it and points at a collector. Trace/span IDs still appear in logs when sampled.
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
  observations:
    key-values:
      deployment.environment: ${APP_ENV:local}

# ============================================================================
# Logging. Base is human-readable; deployed profiles switch to structured JSON.
# When tracing is active, traceId/spanId are added to each line automatically.
# ============================================================================
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.anbit.archetype: ${LOG_LEVEL_APP:INFO}

# ============================================================================
# OpenAPI / Swagger UI (springdoc). Spec: /v3/api-docs  UI: /swagger-ui.html
# ============================================================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false
  # Only document our own endpoints.
  packages-to-scan: com.anbit.archetype
