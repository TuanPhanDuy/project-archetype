# =====================================================================
# Software Development Life Cycle (SDLC) definition for this service.
# Machine-readable source of truth for the Scrum/Agile team of role-
# specialized Claude Code subagents, the ceremonies, the phase pipeline,
# and their entry/exit gates. Human-readable overview in
# .claude/agents/README.md; Jira wiring in .claude/skills/jira/SKILL.md.
# =====================================================================

project:
  name: service-archetype   # renamed automatically by scripts/new-project.sh
  description: >
    Spring Boot 4 (Spring Framework 7, Java 25) REST microservice archetype,
    run end-to-end by a team of role-specialized Claude Code subagents.
  stack: Java 25, Spring Boot 4, Postgres, Flyway, Testcontainers

methodology: scrum
sprint_length_days: 10   # two-week sprints by default; change to fit your team

# ---- Issue tracker: where the backlog, sprints, and work-item status live ----
tracker:
  type: jira
  # Preferred: Atlassian Remote MCP server (OAuth — no token stored in the repo).
  #   claude mcp add --transport http atlassian https://mcp.atlassian.com/v1/sse
  # Fallback: Jira REST API v3 with an API token. See .env.example and
  #   .claude/skills/jira/SKILL.md for setup and field mapping.
  project_key_env: JIRA_PROJECT_KEY
  issue_types:
    epic: Epic
    story: Story
    subtask: Subtask
    bug: Bug
  # Jira Cloud "team-managed" projects link children via the `parent` field;
  # classic "company-managed" projects use the Epic Link custom field instead —
  # set jira.epic_link_field_id in .env if yours is a classic project.
  epic_link_field: parent
  fallback_docs: docs/backlog.md   # used when no tracker is connected

# ---- Code hosting: where PRs are reviewed and merged ----
vcs:
  type: github
  # Primary path: the `gh` CLI (already authenticated in this environment) — see
  #   .claude/commands/review-pr.md, which drives the Code Review + Security Review phases
  #   against a real PR and gates auto-merge on a clean verdict from both.
  # Also available: the GitHub MCP server in .mcp.json (structured tool calls, useful for
  #   agents/environments without `gh` installed). See .env.example for its token.
  auto_merge_requires: [code-reviewer:APPROVE, security-auditor:PASS]   # any qualifier blocks it

# ---- Review iteration cap: prevents an unbounded dev<->review loop. A "round" is one
# rejection — Code Review REQUEST CHANGES, Security Review BLOCK, or Team Lead NOT
# APPROVED — against essentially the same diff. The counter is shared across all three,
# not per-phase, since they're all "review found a problem, go fix it" cycles on the same
# piece of work. ----
review_iteration_limit: 3
review_iteration_policy: >
  After this many rounds without a clean verdict, stop auto-looping back to the dev phase.
  The next round is an escalation, not another fix-and-re-review cycle: compile every
  round's findings into one report (what's been tried, what's still failing, and why the
  same class of issue keeps recurring) and hand it to a human — via `scrum-master`, or as
  a PR comment (see `.claude/commands/review-pr.md`) — instead of dispatching another
  automatic fix attempt. `team-lead` enforces this at the final gate; `code-reviewer` and
  `security-auditor` should say plainly which round their verdict is when it's not the
  first.

# ---- Model selection: work-planner picks a model per dispatched work package to balance
# output quality against token cost/latency. Not every package needs the strongest model —
# and skimping on a genuinely hard one costs more in rework/review rounds than it saves.
# Every agent's own frontmatter stays `model: inherit`; this is an override applied at
# dispatch time only, so a directly-invoked agent (not via work-planner) is unaffected. ----
model_selection:
  owner: work-planner
  guidance:
    haiku: >
      Mechanical, low-ambiguity work: a change that follows an exact existing pattern
      (a config/copy tweak, a CRUD endpoint that mirrors Product's shape 1:1, a docs
      update), or test scaffolding that mirrors an existing test almost exactly.
    sonnet: >
      The default. Most implementation and test packages: typical business logic,
      standard endpoints, anything that doesn't clearly qualify for haiku or opus.
    opus: >
      Packages with real ambiguity or stakes: concurrency/idempotency logic, anything
      in a high_risk-classified story (see task_classification), security-sensitive
      code (authn/authz, payment, PII), or a package whose design leaves significant
      judgment to the implementer.
  rule: >
    Choose per package, not by story tier alone — a high_risk story can still contain a
    trivial package (e.g. an OpenAPI description update) that doesn't need opus, and a
    standard story can contain one gnarly package that does. When genuinely unsure
    between two levels, prefer the stronger one for anything touching correctness or
    security, and the cheaper one for anything purely mechanical — a wrong call on a
    mechanical package is cheap to catch in review, a wrong call on a hard one usually
    isn't caught until it's already cost a review round or an incident.

# ---- The team: each role maps to a Claude Code subagent in .claude/agents/ ----
roles:
  - id: product-owner
    title: Product Owner
    agent: product-owner
    skill: Backlog, priorities, PRD.md, enhancement items with business value + acceptance criteria.
  - id: scrum-master
    title: Scrum Master
    agent: scrum-master
    skill: Sprint planning, board, ceremonies, blockers.
  - id: ux-designer
    title: UI/UX Designer
    agent: ux-designer
    skill: API/UX and error ergonomics; frontend flows/wireframes.
  - id: requirements-analyst
    title: Requirements / Business Analyst
    agent: requirements-analyst
    skill: User stories, acceptance criteria, scope, non-functionals.
  - id: solution-architect
    title: Solution Architect
    agent: solution-architect
    skill: API contract, data model, component design, work breakdown.
  - id: work-planner
    title: Work Planner
    agent: work-planner
    skill: >
      Splits an agreed design into independent work packages, dispatches each to the
      right specialist agent (senior-developer/test-engineer/devops-engineer) in
      parallel where safe, merges the results, and reports status to scrum-master.
      Optional — only for stories wide enough that this beats one engineer working
      serially.
  - id: senior-developer
    title: Senior Developer
    agent: senior-developer
    skill: >
      Implementation, including decisions the design leaves open; not limited to the
      Spring Boot/Java stack.
  - id: test-engineer
    title: QA / Test Engineer
    agent: test-engineer
    skill: Unit + Testcontainers integration tests from acceptance criteria.
  - id: code-reviewer
    title: Code Reviewer
    agent: code-reviewer
    skill: Diff review for correctness, convention-adherence, simplicity.
  - id: security-auditor
    title: Security Reviewer
    agent: security-auditor
    skill: OWASP API Top 10, authz, input handling, secrets.
  - id: devops-engineer
    title: DevOps / Release Engineer
    agent: devops-engineer
    skill: CI/CD, builds, containerization, observability, deploy config.
  - id: team-lead
    title: Team Lead
    agent: team-lead
    skill: Final go/no-go — confirms acceptance criteria met and every prior gate genuinely holds.

# ---- Scrum ceremonies. Cadence is a default — adjust to your team's rhythm. ----
ceremonies:
  - id: backlog_refinement
    name: Backlog Refinement
    owner: product-owner
    cadence: ongoing, at least once per sprint
    command: /prd-to-jira
    purpose: >
      Turn PRD.md into Ready backlog items — Epics, Stories with Given/When/Then
      acceptance criteria, and Subtasks — created (or updated) in Jira.
  - id: sprint_planning
    name: Sprint Planning
    owner: scrum-master
    participants: [product-owner, solution-architect]
    cadence: start of every sprint
    purpose: Pull Ready items into the sprint under one sprint goal, sized to capacity.
  - id: daily_standup
    name: Daily Standup
    owner: scrum-master
    cadence: daily
    purpose: Progress / plan / blockers per in-flight item. Keep it under 15 minutes.
  - id: sprint_review
    name: Sprint Review
    owner: scrum-master
    participants: [product-owner]
    cadence: end of every sprint
    purpose: Demo what shipped against the sprint goal; gather feedback.
  - id: retrospective
    name: Retrospective
    owner: scrum-master
    cadence: end of every sprint
    purpose: What went well / what to improve, with concrete, owned action items.

# ---- Task classification: not every item needs the full pipeline. Classify a task into
# one of these tiers before choosing which phases actually run (see workflow_profiles
# below) — requirements-analyst assigns the tier as part of its phase-1 output (see
# .claude/agents/requirements-analyst.md). Re-classify immediately if new information
# contradicts the assigned tier during any later phase; never keep the lighter gates once
# a task turns out riskier than first thought. ----
task_classification:
  owner: requirements-analyst
  tiers:
    - id: fast_path
      name: Fast Path (low risk)
      criteria: >
        No schema/migration change; no new external dependency; doesn't touch
        authn/authz, payment, or PII-handling code; single, tightly-scoped change
        (roughly one class/file or equivalent); existing test patterns already cover
        the shape of the change.
      examples: >
        Copy/doc fix, config value tweak, dependency patch bump, log/observability
        tweak, adding a read-only GET endpoint with no new persistence.
    - id: standard
      name: Standard (default)
      criteria: Anything that doesn't clearly qualify as Fast Path or High Risk.
    - id: high_risk
      name: High Risk
      criteria: >
        Touches authn/authz, payment/money, or PII/data-retention logic; a backward-
        incompatible API or schema change; a new external dependency/integration or
        cross-service contract change; or is explicitly flagged by product-owner or
        requirements-analyst regardless of size.

# ---- Workflow profiles: the ordered phase list each tier actually runs. A phase not
# listed for a tier is skipped outright, not just "informal" — its normal outputs must
# still exist by the time a later phase needs them (e.g. Fast Path skips Design, so
# Requirements' acceptance criteria must be unambiguous enough to implement directly
# against, with no design gap left for the implementer to guess at). ----
workflow_profiles:
  fast_path:
    phases: [requirements, implementation, testing, code_review, team_lead_approval, release]
    definition_of_done: fast_path
    notes: >
      Skips Design, Work Planning, and Security Review as separate phases. code_review
      absorbs a lightweight security spot-check instead (see
      .claude/agents/code-reviewer.md) — if it flags anything security-relevant, stop
      and re-classify to at least Standard rather than approving around it.
  standard:
    phases: [requirements, design, work_planning, implementation, testing, code_review, security_review, team_lead_approval, release]
    definition_of_done: standard
  high_risk:
    phases: [requirements, design, work_planning, implementation, testing, code_review, security_review, team_lead_approval, release]
    definition_of_done: high_risk
    notes: >
      Same phases as Standard; every gate is stricter — see the high_risk definition of
      done. Security Review must return an unqualified PASS to proceed ("PASS WITH
      RECOMMENDATIONS" does not auto-continue), and Team Lead explicitly re-verifies
      non-functionals, not just acceptance criteria.

# ---- Lifecycle phases for a single work item, in order. Which ones actually run for a
# given task is set by its classification — see workflow_profiles above. ----
phases:
  - id: requirements
    name: Requirements
    owner: requirements-analyst
    inputs: [backlog item (Jira Story / PRD.md), existing code]
    outputs: [acceptance criteria (Given/When/Then), non-functionals, open questions]
    entry_gate: Item is in the sprint (Sprint Planning) or explicitly requested.
    exit_gate: Acceptance criteria are unambiguous; open questions resolved.

  - id: design
    name: Design
    owner: solution-architect
    # Not run for the fast_path profile — see workflow_profiles.
    inputs: [requirements]
    outputs: [API contract, data model / Flyway plan, work breakdown]
    entry_gate: Requirements exit_gate met.
    exit_gate: Every requirement maps to a designed component; work breakdown is executable.

  - id: work_planning
    name: Work Planning & Orchestration
    owner: work-planner
    optional: true   # skip straight to Implementation for small/atomic changes; also not
                      # run for the fast_path profile — see workflow_profiles.
    inputs: [design, work breakdown]
    outputs: [independent work packages, dependency graph, dispatched + merged changes, status report to scrum-master]
    entry_gate: Design exit_gate met; the work is wide enough that parallel dispatch is worth the coordination cost.
    exit_gate: >
      Every requirement maps to a package; parallel-safe packages share no files/symbols/
      migrations; sequential packages have an explicit required order; every dispatched
      package is merged, verified, and its status reported to scrum-master.
    # When this phase runs, work-planner dispatches senior-developer/test-engineer/
    # devops-engineer itself (see .claude/agents/work-planner.md) — it drives Implementation
    # and Testing below directly, rather than each being invoked separately by a human.

  - id: implementation
    name: Implementation
    owner: senior-developer
    driven_by: work-planner, when Work Planning ran (optional)
    inputs: [design, work breakdown]
    outputs: [code changes]
    entry_gate: Design exit_gate met.
    exit_gate: "./mvnw compile succeeds; conventions honored (package-by-layer, DTO boundary, Flyway-owned schema)."

  - id: testing
    name: Testing
    owner: test-engineer
    driven_by: work-planner, when Work Planning ran (optional)
    inputs: [acceptance criteria, code changes]
    outputs: [unit + Testcontainers integration tests]
    entry_gate: Implementation exit_gate met.
    exit_gate: Every acceptance criterion covered by a passing test; ./mvnw verify green.

  - id: code_review
    name: Code Review
    owner: code-reviewer
    parallel_with: [security_review]
    command: /review-pr <pr-number>
    inputs: [git diff, tests]
    outputs: [findings]
    entry_gate: Testing exit_gate met.
    exit_gate: No blocking findings remain.

  - id: security_review
    name: Security Review
    owner: security-auditor
    # Not run for the fast_path profile — code_review's lightweight security spot-check
    # substitutes; see workflow_profiles.
    parallel_with: [code_review]
    command: /review-pr <pr-number>
    inputs: [git diff, touched surfaces]
    outputs: [findings, severity-rated]
    entry_gate: Testing exit_gate met.
    exit_gate: No Critical/High findings unaddressed.
    # /review-pr runs both phases together against a real PR (isolated git worktree via
    # `gh`) and auto-merges only when code-reviewer is APPROVE *and* security-auditor is
    # PASS with no qualifications; anything less is posted as a PR review for a human.

  - id: team_lead_approval
    name: Team Lead Approval
    owner: team-lead
    inputs: [requirements, all prior phase verdicts]
    outputs: [go/no-go verdict]
    entry_gate: >
      Code Review exit_gate met, and Security Review's too for any tier that runs it
      (check the task's workflow_profile, don't assume Standard).
    exit_gate: "Verdict is APPROVED FOR MERGE — acceptance criteria genuinely met and every prior gate verified, not just claimed."

  - id: release
    name: Build / Release
    owner: devops-engineer
    inputs: [all prior phase outputs and gates]
    outputs: [CI green, image build, deploy config]
    entry_gate: Team Lead Approval exit_gate met.
    exit_gate: CI green; native/JVM image builds; observability wired.

# ---- Definition of done, per tier. standard is the baseline; fast_path is a
# deliberately lighter subset for low-risk work; high_risk is standard plus stricter
# gates. Referenced by id from workflow_profiles above. ----
definition_of_done:
  fast_path:
    - Acceptance criteria met by a passing test — unit tests at minimum; add an `*IT`
      only if the change touches persistence or the API contract.
    - "`./mvnw test` is green. (`./mvnw verify` only if an `*IT` was added.)"
    - code-reviewer verdict is APPROVE or APPROVE WITH NITS, and has explicitly
      confirmed no security-relevant surface was touched (see
      .claude/agents/code-reviewer.md) — if it flagged one, this tier no longer
      applies; re-classify and satisfy the standard/high_risk definition of done instead.
    - Team Lead has given an explicit APPROVED FOR MERGE verdict.
    - Docs updated only if the change is user/consumer visible.

  standard:
    - Acceptance criteria all demonstrably met by a passing test.
    - "`./mvnw verify` is green (unit + Testcontainers integration tests)."
    - No blocking code-review findings; no Critical/High security findings.
    - Team Lead has given an explicit APPROVED FOR MERGE verdict.
    - API errors are RFC 9457 ProblemDetail; schema changes are Flyway migrations.
    - Tracker item (Jira Epic/Story/Subtask) transitioned to Done and linked to the PR.
    - Docs (README/ARCHITECTURE/OpenAPI) updated for any contract/config change.

  high_risk:
    - Everything in the standard definition of done, plus —
    - >-
      Security Review verdict is an unqualified PASS — "PASS WITH RECOMMENDATIONS" blocks
      merge until every recommendation is resolved or explicitly ticketed, not just noted.
    - Team Lead has explicitly re-checked non-functionals (not just acceptance criteria)
      against the requirements doc.
    - A rollback/mitigation plan is documented (devops-engineer) before release.

# ---- Conventions — see CONTRIBUTING.md for the full write-up ----
conventions:
  branching: trunk-based; short-lived feature branches feature/<jira-key>-<slug>.
  commits: >
    Conventional Commits (feat, fix, docs, style, refactor, perf, test, build, ci, chore),
    enforced by the .githooks/commit-msg hook (run scripts/setup-git-hooks.sh once per
    clone) and, on the PR, by .github/workflows/pr-title.yml. Reference the Jira key.
  pull_requests: >
    Use .github/pull_request_template.md. Branch protection on main requires the
    "Build & test (JDK 25)" and "SonarCloud Code Analysis" checks to pass, blocks force
    pushes/deletions, and requires conversation resolution. Merge strategy is squash-only
    (PR title becomes the commit message — must itself be a valid Conventional Commit).
    Run /review-pr for automated code-reviewer + security-auditor findings.
  versioning: SemVer; devops-engineer bumps pom.xml on release.
