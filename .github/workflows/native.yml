name: Native image

# GraalVM native build is slow (~minutes), so run it on demand and on version tags,
# not on every PR.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  native:
    name: Build native executable (GraalVM 25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM for JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven

      - name: Compile native executable
        run: ./mvnw -B --no-transfer-progress -Pnative native:compile -DskipTests

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: service-archetype-native
          path: target/service-archetype
          if-no-files-found: error
